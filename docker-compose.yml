services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: visiontestai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/VisionTestAI.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=visiontestai;Username=postgres;Password=postgres
      - Jwt__Key=VisionTestAI-Super-Secret-Key-That-Is-Long-Enough-For-256-Bits!!
      - Jwt__Issuer=VisionTestAI
      - Jwt__Audience=VisionTestAI-Client
      - Gemini__ApiKey=${GEMINI_API_KEY}
      - Cors__Origins__0=http://localhost:5173
      - Cors__Origins__1=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
